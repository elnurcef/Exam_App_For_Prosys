<section class="panel">
  <h2>{{ lesson ? 'Edit Lesson' : 'Add Lesson' }}</h2>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-grid">
      <label>
        Code
        <input type="text" formControlName="code" maxlength="3" />
        <span class="field-error" *ngIf="form.controls.code.touched && form.controls.code.hasError('required')">Code is required.</span>
        <span class="field-error" *ngIf="form.controls.code.touched && (form.controls.code.hasError('minlength') || form.controls.code.hasError('maxlength'))">Code must be exactly 3 characters.</span>
        <span class="field-error" *ngIf="form.controls.code.touched && form.controls.code.hasError('pattern')">Use uppercase letters and digits only.</span>
      </label>

      <label>
        Name
        <input type="text" formControlName="name" maxlength="30" />
        <span class="field-error" *ngIf="form.controls.name.touched && form.controls.name.hasError('required')">Name is required.</span>
        <span class="field-error" *ngIf="form.controls.name.touched && form.controls.name.hasError('maxlength')">Maximum 30 characters.</span>
      </label>

      <label>
        Class
        <input type="number" formControlName="classLevel" min="1" max="12" />
        <span class="field-error" *ngIf="form.controls.classLevel.touched && form.controls.classLevel.invalid">Class level must be between 1 and 12.</span>
      </label>
    </div>

    <div class="alert error" *ngIf="error">{{ error }}</div>

    <div class="actions">
      <button type="submit" [disabled]="loading">{{ loading ? 'Saving...' : (lesson ? 'Update Lesson' : 'Create Lesson') }}</button>
      <button type="button" class="secondary" *ngIf="lesson" (click)="cancel()">Cancel</button>
    </div>
  </form>
</section>
