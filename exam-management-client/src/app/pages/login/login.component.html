<section class="auth-panel">
  <h1>Teacher Login</h1>
  <p class="muted">Sign in to manage lessons, students, exams, and results.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email" />
      <span class="field-error" *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">Email is required.</span>
      <span class="field-error" *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">Enter a valid email.</span>
    </label>

    <label>
      Password
      <input type="password" formControlName="password" autocomplete="current-password" />
      <span class="field-error" *ngIf="form.controls.password.touched && form.controls.password.hasError('required')">Password is required.</span>
    </label>

    <div class="alert error" *ngIf="error">{{ error }}</div>

    <button type="submit" [disabled]="loading">{{ loading ? 'Signing in...' : 'Login' }}</button>
  </form>

  <p class="auth-link">No account yet? <a routerLink="/signup">Create teacher account</a></p>
</section>
