<section class="auth-panel">
  <h1>Teacher Sign Up</h1>
  <p class="muted">Create an account to keep your school data private to you.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="two-column">
      <label>
        First name
        <input type="text" formControlName="firstName" autocomplete="given-name" maxlength="20" />
        <span class="field-error" *ngIf="form.controls.firstName.touched && form.controls.firstName.hasError('required')">First name is required.</span>
        <span class="field-error" *ngIf="form.controls.firstName.touched && form.controls.firstName.hasError('maxlength')">Maximum 20 characters.</span>
      </label>

      <label>
        Last name
        <input type="text" formControlName="lastName" autocomplete="family-name" maxlength="20" />
        <span class="field-error" *ngIf="form.controls.lastName.touched && form.controls.lastName.hasError('required')">Last name is required.</span>
        <span class="field-error" *ngIf="form.controls.lastName.touched && form.controls.lastName.hasError('maxlength')">Maximum 20 characters.</span>
      </label>
    </div>

    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email" />
      <span class="field-error" *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">Email is required.</span>
      <span class="field-error" *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">Enter a valid email.</span>
    </label>

    <label>
      Password
      <input type="password" formControlName="password" autocomplete="new-password" />
      <span class="field-error" *ngIf="form.controls.password.touched && form.controls.password.hasError('required')">Password is required.</span>
      <span class="field-error" *ngIf="form.controls.password.touched && form.controls.password.hasError('minlength')">At least 8 characters.</span>
      <span class="field-error" *ngIf="form.controls.password.touched && form.controls.password.hasError('pattern')">Use uppercase, lowercase, and a number.</span>
    </label>

    <label>
      Confirm password
      <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
      <span class="field-error" *ngIf="form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('required')">Confirmation is required.</span>
      <span class="field-error" *ngIf="form.touched && form.hasError('passwordMismatch')">Password confirmation must match.</span>
    </label>

    <div class="alert error" *ngIf="error">{{ error }}</div>

    <button type="submit" [disabled]="loading">{{ loading ? 'Creating account...' : 'Sign Up' }}</button>
  </form>

  <p class="auth-link">Already registered? <a routerLink="/login">Login</a></p>
</section>
